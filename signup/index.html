<!doctype html>
<html lang="zh-Hant">
<head>
  <!-- v4.3.7｜GitHub Pages 外層 PWA 入口 -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#4f9bff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="羽球報名">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>羽球報名系統</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #edf5fb;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    .app-shell {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100dvh;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      background: #edf5fb;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #edf5fb;
    }

    .fallback {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 2;
      display: none;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, .94);
      box-shadow: 0 16px 40px rgba(15, 23, 42, .18);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.45;
    }

    .fallback a {
      color: #1479d8;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <iframe
      title="羽球報名系統"
      src="https://script.google.com/macros/s/AKfycbw1yQZtGYP1YTAMvvrEZPiP8m6_gCb_-lnCKeKHRGOJ1zuFGK0GHxHouJyoqeci-TLnqQ/exec?site=kangxuan"
      allow="clipboard-write"
      referrerpolicy="no-referrer-when-downgrade"></iframe>
  </main>
  <div class="fallback" id="fallback">
    若畫面沒有載入，請<a href="https://script.google.com/macros/s/AKfycbw1yQZtGYP1YTAMvvrEZPiP8m6_gCb_-lnCKeKHRGOJ1zuFGK0GHxHouJyoqeci-TLnqQ/exec?site=kangxuan">開啟原報名系統</a>。
  </div>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function () {});
      });
    }

    window.setTimeout(function () {
      var fallback = document.getElementById("fallback");
      if (fallback) fallback.style.display = "block";
    }, 8000);
  </script>
</body>
</html>
